<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Paiement</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:black;
    color:white;
    border:none;
    border-radius:15px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧾 Ticket paiement</h1>

<input type="text" id="motif" placeholder="Motif">
<input type="number" id="montant" placeholder="Montant">

<button onclick="envoyerTicket()">Envoyer à l'impression</button>

</div>

<script>

function genererTexte(){
    const motif = document.getElementById("motif").value;
    const montant = document.getElementById("montant").value;

    if(!motif || !montant){
        alert("Remplis tout");
        return null;
    }

    const date = new Date().toLocaleString("fr-FR");

    // ⚠️ IMPORTANT : pas de retour cassé
    return `TICKETS-PAIEMENT
----------------------
Date : ${date}
Motif : ${motif}
----------------------
Montant : ${montant} €
----------------------
Merci`;
}

async function envoyerTicket(){

    const texte = genererTexte();
    if(!texte) return;

    console.log("TEXTE:", texte); // debug utile

    if(navigator.share){

        try{
            await navigator.share({
                title: "Ticket paiement",
                text: texte
            });
        } catch(e){
            alert("Partage annulé ou impossible");
        }

    } else {
        navigator.clipboard.writeText(texte);
        alert("Ticket copié");
    }
}

</script>

</body>
</html>
