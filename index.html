<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Paiement</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:black;
    color:white;
    border:none;
    border-radius:15px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧾 Ticket paiement</h1>

<input type="text" id="motif" placeholder="Motif">
<input type="number" id="montant" placeholder="Montant">

<button onclick="genererImage()">Générer image ticket</button>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

function genererImage(){

    const motif = document.getElementById("motif").value;
    const montant = document.getElementById("montant").value;

    if(!motif || !montant){
        alert("Remplis tout");
        return;
    }

    const date = new Date().toLocaleString("fr-FR");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // format ticket 58mm (approx 384px width)
    canvas.width = 384;
    canvas.height = 500;

    // fond blanc
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "black";

    // titre
    ctx.font = "bold 22px monospace";
    ctx.textAlign = "center";
    ctx.fillText("TICKETS-PAIEMENT", canvas.width/2, 40);

    // ligne
    ctx.font = "14px monospace";
    ctx.fillText("------------------------", canvas.width/2, 70);

    // date
    ctx.textAlign = "left";
    ctx.fillText("Date: " + date, 20, 110);

    // motif
    ctx.fillText("Motif: " + motif, 20, 150);

    // ligne
    ctx.fillText("------------------------", 20, 190);

    // montant
    ctx.font = "bold 28px monospace";
    ctx.textAlign = "center";
    ctx.fillText(montant + " €", canvas.width/2, 260);

    // ligne
    ctx.font = "14px monospace";
    ctx.fillText("------------------------", canvas.width/2, 310);

    ctx.fillText("Merci de votre visite", canvas.width/2, 350);

    // conversion image
    const image = canvas.toDataURL("image/png");

    telechargerEtPartager(image);
}

function telechargerEtPartager(image){

    fetch(image)
    .then(res => res.blob())
    .then(blob => {

        const file = new File([blob], "ticket.png", {type:"image/png"});

        if(navigator.share){
            navigator.share({
                title: "Ticket paiement",
                files: [file]
            });
        } else {
            alert("Partage non supporté, ouvre sur Safari iOS");
        }

    });

}

</script>

</body>
</html>
