<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Paiement</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    margin-top:10px;
    margin-bottom:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:black;
    color:white;
    border:none;
    border-radius:15px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>🧾 Ticket paiement</h1>

<input type="text" id="motif" placeholder="Motif">
<input type="number" id="montant" placeholder="Montant">

<button onclick="genererImage()">Générer ticket image</button>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>

function genererImage(){

    const motif = document.getElementById("motif").value;
    const montant = document.getElementById("montant").value;

    if(!motif || !montant){
        alert("Remplis tout");
        return;
    }

    const now = new Date();
    const date = now.toLocaleDateString("fr-FR");
    const heure = now.toLocaleTimeString("fr-FR");

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // format ticket 58mm
    canvas.width = 384;
    canvas.height = 600;

    // fond blanc
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "black";

    // TITRE
    ctx.font = "bold 26px Arial";
    ctx.textAlign = "center";
    ctx.fillText("TICKETS-PAIEMENT", canvas.width/2, 50);

    // ligne
    drawLine(ctx, 80);

    // DATE
    ctx.font = "16px Arial";
    ctx.textAlign = "left";
    ctx.fillText("Date : " + date, 20, 130);
    ctx.fillText("Heure : " + heure, 20, 160);

    drawLine(ctx, 190);

    // MOTIF
    ctx.fillText("Motif :", 20, 240);
    ctx.font = "bold 18px Arial";
    ctx.fillText(motif, 20, 270);

    drawLine(ctx, 310);

    // MONTANT GROS
    ctx.font = "bold 40px Arial";
    ctx.textAlign = "center";
    ctx.fillText(montant + " €", canvas.width/2, 400);
drawLine(ctx, 440);

    // EXPORT IMAGE
    const image = canvas.toDataURL("image/png");

    partager(image);
}

function drawLine(ctx, y){
    ctx.beginPath();
    ctx.setLineDash([6,4]);
    ctx.moveTo(20, y);
    ctx.lineTo(364, y);
    ctx.stroke();
    ctx.setLineDash([]);
}

function partager(image){

    fetch(image)
    .then(res => res.blob())
    .then(blob => {

        const file = new File([blob], "ticket.png", {type:"image/png"});

        if(navigator.share){
            navigator.share({
                title: "Ticket paiement",
                files: [file]
            });
        } else {
            alert("Partage non supporté sur ce navigateur");
        }

    });

}

</script>

</body>
</html>
