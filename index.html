<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets Paiement</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f2f2f2;
        margin:0;
        padding:20px;
    }

    .container{
        max-width:400px;
        margin:auto;
        background:white;
        padding:20px;
        border-radius:20px;
        box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    h1{
        text-align:center;
        color:#222;
        margin-bottom:25px;
    }

    label{
        font-weight:bold;
        display:block;
        margin-top:15px;
        margin-bottom:5px;
    }

    input{
        width:100%;
        padding:12px;
        border-radius:12px;
        border:1px solid #ccc;
        font-size:16px;
        box-sizing:border-box;
    }

    button{
        width:100%;
        margin-top:25px;
        padding:15px;
        border:none;
        border-radius:15px;
        background:#000;
        color:white;
        font-size:18px;
        font-weight:bold;
        cursor:pointer;
    }

    button:hover{
        opacity:0.9;
    }

    /* Ticket thermique */
    #ticket{
        width:58mm;
        background:white;
        color:black;
        padding:10px;
        margin:auto;
        font-family: monospace;
        display:none;
    }

    .center{
        text-align:center;
    }

    .title{
        font-size:20px;
        font-weight:bold;
        margin-bottom:10px;
    }

    .separator{
        border-top:1px dashed black;
        margin:10px 0;
    }

    .amount{
        font-size:28px;
        font-weight:bold;
        text-align:center;
        margin:15px 0;
    }

    .footer{
        text-align:center;
        margin-top:20px;
        font-size:12px;
    }

    @media print {
        body *{
            visibility:hidden;
        }

        #ticket, #ticket *{
            visibility:visible;
        }

        #ticket{
            position:absolute;
            left:0;
            top:0;
            width:58mm;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>🧾 Tickets Paiement</h1>

    <label>Motif</label>
    <input type="text" id="motif" placeholder="Ex: Consultation">

    <label>Montant (€)</label>
    <input type="number" id="montant" placeholder="Ex: 25">

    <button onclick="imprimerTicket()">
        Imprimer le ticket
    </button>
</div>

<!-- Ticket -->
<div id="ticket">
    <div class="center">
        <div class="title">TICKETS-PAIEMENT</div>
    </div>

    <div class="separator"></div>

    <p><strong>Date :</strong> <span id="dateTicket"></span></p>

    <p><strong>Motif :</strong><br>
    <span id="motifTicket"></span></p>

    <div class="separator"></div>

    <div class="amount">
        <span id="montantTicket"></span> €
    </div>

    <div class="separator"></div>

   
</div>

<script>

function imprimerTicket(){

    const motif = document.getElementById("motif").value;
    const montant = document.getElementById("montant").value;

    if(!motif || !montant){
        alert("Veuillez remplir tous les champs");
        return;
    }

    const maintenant = new Date();

    const dateFormatee =
        maintenant.toLocaleDateString('fr-FR') +
        " " +
        maintenant.toLocaleTimeString('fr-FR');

    const contenu = `
    <html>
    <head>
        <title>Ticket</title>

        <style>
            body{
                width:58mm;
                font-family: monospace;
                padding:10px;
                color:black;
            }

            .center{
                text-align:center;
            }

            .title{
                font-size:22px;
                font-weight:bold;
                margin-bottom:10px;
            }

            .separator{
                border-top:1px dashed black;
                margin:10px 0;
            }

            .amount{
                font-size:30px;
                font-weight:bold;
                text-align:center;
                margin:20px 0;
            }

            .footer{
                text-align:center;
                font-size:12px;
                margin-top:20px;
            }
        </style>
    </head>

    <body>

        <div class="center">
            <div class="title">TICKETS-PAIEMENT</div>
        </div>

        <div class="separator"></div>

        <p><strong>Date :</strong><br>${dateFormatee}</p>

        <p><strong>Motif :</strong><br>${motif}</p>

        <div class="separator"></div>

        <div class="amount">
            ${montant} €
        </div>

        <div class="separator"></div>

        <div class="footer">
            Merci de votre visite
        </div>

    </body>
    </html>
    `;

    const fenetre = window.open('', '', 'width=400,height=600');

    fenetre.document.write(contenu);
    fenetre.document.close();

    fenetre.focus();

    setTimeout(() => {
        fenetre.print();
    }, 500);
}

</script>

</body>
</html>
